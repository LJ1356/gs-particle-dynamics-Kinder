exp_dir: /home/liang/claude/gs-particle-dynamics/checkpoints
exp_name: mujoco_sweep_overfit
output_dir: /home/liang/claude/gs-particle-dynamics/rollout_outputs
device: cuda

# Overfit one demo WITHOUT action conditioning — baseline A/B for the action overfit.
# Same single-demo train/test as config_mujoco_action_overfit.yaml. On a single
# deterministic trajectory the no-action model can also memorize, so expect this to
# overfit too; the comparison is informative on the 100/10-demo setting, not here.

model:
  type: Interaction_PointConv
  output_dim: 7
  pointcloud_feat: 32
  pred_mlp_input_feat_dim: 32
  pred_mlp_hidden_dim: 256
  input_frame_num: 2
  dist_threshold: 0.15
  soft_id: false
  rigid_pose_fitting: false
  pointwise_prediction: true
  acceleration_prediction: false

pointcloud:
  input_dim: 3
  knn: 32
  knn_k_decay_factor: 2
  grid_size:
    - 0.02 # 2 cm
    - 0.05 # 5 cm
  scaling: 10.0

train:
  batch_sz: 4
  view_num: 1
  frames_per_scene: 200
  num_workers: 2
  seq_len: 5
  learning_rate: 0.001
  loss_type: position
  hard_example_mining: false
  warm_up_epoch: 2
  epoch: 100
  milestones:
    - 60
    - 90
    - 100

test:
  batch_sz: 1
  view_num: 1
  num_workers: 2
  seq_len: 700

dataset:
  name: mujoco_sweep
  train_data_dir: /home/liang/claude/kindergarden/hdf5_data/sweep_canonical_10d_nocamera_1demos_train.hdf5
  test_data_dir: /home/liang/claude/kindergarden/hdf5_data/sweep_canonical_10d_nocamera_1demos_train.hdf5
  gravity_axis: 2
  object_id_mode: "part"
  max_object_num: 19
  camera_num: 1
  pts_per_geom: 50
