exp_dir: /home/liang/claude/gs-particle-dynamics/checkpoints
exp_name: mujoco_sweep_action_overfit_gripper_norpe
output_dir: /home/liang/claude/gs-particle-dynamics/rollout_outputs
device: cuda

# Overfit-one-demo: action conditioning, gripper-only geometry, NON-objcentric,
# NO RPE. This is the no-RPE baseline for the RPE A/B — identical to
# config_mujoco_action_overfit_gripper_rpe.yaml except action_use_rpe: false.

model:
  type: Interaction_PointConv
  output_dim: 7
  pointcloud_feat: 32
  pred_mlp_input_feat_dim: 32
  pred_mlp_hidden_dim: 256
  input_frame_num: 2
  dist_threshold: 0.15
  soft_id: false
  rigid_pose_fitting: false  # objcentric OFF — per-point prediction
  pointwise_prediction: true
  acceleration_prediction: false
  # ── action conditioning (Phase 4) ──
  use_action_conditioning: true
  action_key: actions_delta_ee_base_10d
  action_dim: 10
  action_scale: 10.0
  action_inject_blocks: [0]                # 0 = paper Block 4 (object_modeling idx 3); [0,1] for 4+5
  action_attention_num_heads: 4
  action_use_gamma: true                   # zero-init residual gate; set false for plain residual
  action_use_rpe: false                    # NO RPE (baseline for the RPE A/B)

pointcloud:
  input_dim: 3
  knn: 32
  knn_k_decay_factor: 2
  grid_size:
    - 0.02 # 2 cm
    - 0.05 # 5 cm
  scaling: 10.0

train:
  batch_sz: 4
  view_num: 1
  frames_per_scene: 200   # many windows per epoch from the single demo (overfit)
  num_workers: 2
  seq_len: 5
  learning_rate: 0.001
  loss_type: position
  hard_example_mining: false
  warm_up_epoch: 2
  epoch: 100
  milestones:
    - 60
    - 90
    - 100

test:
  batch_sz: 1
  view_num: 1
  num_workers: 2
  seq_len: 700

dataset:
  name: mujoco_sweep
  train_data_dir: /home/liang/claude/kindergarden/hdf5_data/sweep_canonical_10d_nocamera_1demos_train.hdf5
  test_data_dir: /home/liang/claude/kindergarden/hdf5_data/sweep_canonical_10d_nocamera_1demos_train.hdf5
  gravity_axis: 2
  object_id_mode: "part"
  max_object_num: 19
  camera_num: 1
  pts_per_geom: 50
  robot_geometry_scope: gripper_only   # keep only gripper finger contact pads (~400 pts)
