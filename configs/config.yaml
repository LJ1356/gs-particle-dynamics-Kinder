exp_dir: 
exp_name: 
pretrained_model_chkpt: 
output_dir: 
device: cuda

model:
  type: Interaction_PointConv
  output_dim: 7
  pointcloud_feat: 32
  pred_mlp_input_feat_dim: 32
  pred_mlp_hidden_dim: 256
  input_frame_num: 2 # Each frame input includes velocity as input, so the actual number of input frames is 3. Current code doesn't support other input frame numbers.
  dist_threshold: 0.15 # KNN distance threshold for relational pointconv
  soft_id: false
  rigid_pose_fitting: true
  pointwise_prediction: true
  acceleration_prediction: false

pointcloud:
  input_dim: 3
  knn: 32 # knn at the lowest level
  knn_k_decay_factor: 2
  grid_size:
    - 0.02 # 2 cm
    - 0.05 # 5 cm
  scaling: 10.0 # scaling factor for the input point cloud.
    
train:
  batch_sz: 12
  view_num: 4
  frames_per_scene: 10 # number of frames to sample from each scene in an epoch
  num_workers: 6
  seq_len: 5 # number of frames in the training sequence (this includes the input frames defined by input_frame_num)
  learning_rate: 0.001
  loss_type: all # all, position, rendering
  hard_example_mining: false  
  pretrained: false
  warm_up_epoch: 2
  epoch: 50
  milestones:
    - 23
    - 45
    - 50

test:
  batch_sz: 1 # current code doesn't support batch size > 1 during testing
  view_num: 4
  num_workers: 2
  seq_len: 200 # need to be set greater than the total number of frames in the longest test scene for complete rollout generation

dataset:
  name: real_world_collision
  data_dir: 
  raw_dataset_dir: 
  gravity_axis: 2 # depends on the dataset. Currently, z coordinate in [x, y, z]
  max_object_num: 11
  camera_num: 4
